<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<style>
  .bg { fill: #050510; }
  .star1 { animation: twinkle 2s infinite alternate; fill: #ffffff; }
  .star2 { animation: twinkle 4s infinite alternate; fill: #bbbbff; }
  .star3 { animation: twinkle 1.5s infinite alternate; fill: #ffbbbb; }
  .shooting-star { animation: shoot 5s linear infinite; stroke: #ffffff; stroke-width: 2; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
  .planet-layer1 { animation: pulse3d 4s ease-in-out infinite alternate; }
  .planet-layer2 { animation: pulse3d 4.2s ease-in-out infinite alternate; }
  
  @keyframes twinkle {
    0% { opacity: 0.1; }
    100% { opacity: 1; }
  }
  @keyframes shoot {
    0% { transform: translate(0, 0); opacity: 1; stroke-dashoffset: 100; }
    10% { transform: translate(-300px, 300px); opacity: 1; stroke-dashoffset: 0; }
    11% { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes pulse3d {
    0% { transform: scale(1) translate(0px, 0px); }
    100% { transform: scale(1.02) translate(-2px, -2px); }
  }
  .title { font-family: monospace; font-size: 28px; font-weight: bold; fill: #00FF9D; letter-spacing: 2px; }
  .subtitle { font-family: monospace; font-size: 14px; fill: #aaaaaa; }
</style>

